---
configuration:
  ha_username:
    name: "HA Username"
    description: "Home Assistant login user name for optional auto-login [Default: \"\"]"
  ha_password:
    name: "HA Password"
    description: "Home Assistant login password for optional auto-login [Default: \"\"]"
  ha_url:
    name: "HA URL"
    description: |
      Base URL for HA [Default: http://localhost:8123]
      Note: Typically should not need to be changed since browser runs on the
      'localhost' server
  ha_dashboard:
    name: "HA Dashboard"
    description: |
      Dashboard path (following "HA URL"), a host-like target such as
      `localhost:48123/scene/`, or a full absolute target URL.
      [Default: ""]
  login_delay:
    name: "Login Delay"
    description: |
      Time to wait for login page to load in seconds [Default: 1.0]
      Note: Often can set to '0'
  zoom_level:
    name: "Zoom Level"
    description: "Zoom factor 100 = 100% [Default: 100]"
  browser_refresh:
    name: "Browser Refresh"
    description: |
      Browser refresh interval in seconds; 0 for never [Default: 0]
      Note: Keep at 0 unless you explicitly need periodic recovery
  browser_engine:
    name: "Browser Engine"
    description: |
      Choose which browser runtime to launch. `chromium` is recommended for
      modern dashboards, WebGL, emoji rendering, and touch-heavy UIs.
      Switch to `luakit` if you need the original lightweight behavior or
      want to compare compatibility. [Default: chromium]
    items:
      chromium: "Chromium"
      luakit: "Luakit"
  chromium_profile:
    name: "Chromium Profile"
    description: |
      Pick a tested Chromium flag profile. `SwiftShader Scene` restores the
      `.40` HDMI-visible runtime: compositor guards from `.38` plus Chromium's
      software WebGL fallback for the avatar path. `Recovery Baseline`
      restores the early c6378e1 Chromium launch stack, including the old
      prompt/cache suppression and profile bootstrap that existed while Neiri
      still lived inside `HAOS-kiosk Display`. `Legacy Neiri` keeps the later
      ANGLE+GL experiment. `Desktop GLX` bypasses ANGLE and asks Chromium to
      use native desktop OpenGL on X11 directly. `Minimal X11` keeps Chromium
      close to a plain browser. Use `Custom` only when you explicitly want to
      control the advanced flags below. [Default: SwiftShader Scene]
    items:
      intel_hwaccel: "Intel GPU (Hardware)"
      swiftshader_scene: "SwiftShader Scene"
      recovery_baseline: "Recovery Baseline"
      legacy_neiri: "Legacy Neiri"
      desktop_glx: "Desktop GLX"
      minimal: "Minimal X11"
      custom: "Custom"
  chromium_use_gl:
    name: "Chromium GL Mode"
    description: |
      Advanced Chromium `--use-gl` override. Leave on `Auto` unless you are
      deliberately testing a graphics path. [Default: Auto]
    items:
      auto: "Auto"
      desktop: "Desktop GL"
      egl: "EGL"
      angle: "ANGLE"
      swiftshader: "SwiftShader"
  chromium_angle_backend:
    name: "Chromium ANGLE Backend"
    description: |
      Advanced Chromium `--use-angle` backend. Used only when `Chromium GL
      Mode` is set to `ANGLE`. [Default: default]
    items:
      default: "Default"
      gl: "OpenGL"
      gles: "OpenGL ES"
      vulkan: "Vulkan"
      swiftshader: "SwiftShader"
      swiftshader-webgl: "SwiftShader WebGL"
  chromium_enable_gpu_rasterization:
    name: "Enable GPU Rasterization"
    description: |
      Add Chromium flag `--enable-gpu-rasterization`. This was part of the
      older working Neiri runtime profile and should be tested explicitly,
      not forced by default. [Default: False]
  chromium_ignore_gpu_blocklist:
    name: "Ignore GPU Blocklist"
    description: |
      Add Chromium flag `--ignore-gpu-blocklist`. This was part of the older
      working Neiri runtime profile and should be tested explicitly, not
      forced by default. [Default: False]
  chromium_disable_skia_renderer:
    name: "Disable Skia Renderer"
    description: |
      Add Chromium flag `--disable-features=UseSkiaRenderer`. Keep disabled
      unless you are testing an older compositor path. [Default: False]
  chromium_disable_gpu_compositing:
    name: "Disable GPU Compositing"
    description: |
      Add Chromium flag `--disable-gpu-compositing`. Advanced testing only.
      [Default: False]
  chromium_disable_oop_rasterization:
    name: "Disable OOP Rasterization"
    description: |
      Add Chromium flag `--disable-oop-rasterization`. Advanced testing only.
      [Default: False]
  chromium_enable_unsafe_swiftshader:
    name: "Enable Unsafe SwiftShader"
    description: |
      Add Chromium flag `--enable-unsafe-swiftshader`. This only applies to
      `ANGLE` + `SwiftShader WebGL` and should remain off unless you are
      explicitly testing that fallback. [Default: False]
  screen_timeout:
    name: "Screen Timeout"
    description: "Time in seconds until screen blanks; 0 for never [Default: 0]"
  output_number:
    name: "Output Number"
    description: |
      Choose which of the *connected* video output ports to use.
      Set to 1 to use the first connected port. [Default: 1]
  dark_mode:
    name: Dark Mode
    description: "Prefer dark mode where supported if `True` [Default: True]"
  ha_theme:
    name: "HA Theme"
    description: 'Optional HA Theme [Default: ""]'
  ha_sidebar:
    name: "HA Sidebar"
    description: "Status of left sidebar [Default: None]"
    items:
      full: "Full"
      narrow: "Narrow"
      none: "None"
  rotate_display:
    name: "Rotate Display"
    description: "Rotate display [Default: Normal]"
    items:
      normal: "Normal (no rotation)"
      left: "Left (90deg CCW)"
      right: "Right (90deg CW)"
      inverted: "Inverted (180deg)"
  map_touch_inputs:
    name: "Map Touch Inputs"
    description: |
      If 'True', then map all touch pointer inputs to the selected
      video output. In particular, this rotates touch input devices
      consistently with the video output. [Default: True]
  cursor_timeout:
    name: "Cursor Timeout"
    description: |
      Time in seconds for cursor to re-hide after last mouse movement
      or touch. Set to '0' to always show cursor. Set to '-1' to never
      show cursor. [Default: 5 seconds]
  keyboard_layout:
    name: "Keyboard Layout"
    description: "Set the keyboard layout and language [Default: us]"
  onscreen_keyboard:
    name: "Onscreen Keyboard"
    description: "Display an Onscreen Keyboard for text input [Default: True]"
  save_onscreen_config:
    name: "Save Onscreen Config"
    description: |
      Save and Restore changes to Onscreen keyboard settings [Default: True]
  xorg_conf:
    name: "xorg.conf file"
    description: |
      Insert custom 'xorg.conf' code [Default: ""]
  xorg_append_replace:
    name: "Append or Replace"
    description: |
      Choose whether to append to original 'xorg.conf'
      or replace it [Default: Append]
    items:
      append: "Append"
      replace: "Replace"
  audio_sink:
    name: "Audio Sink"
    description: "Audio output sink [Default: Auto]"
    items:
      auto: "Auto"
      hdmi: "HDMI"
      usb: "USB"
      none: "None"
  rest_ip:
    name: "REST IP address"
    description: |
      Listening IP address for REST API server [Default: `127.0.0.1`]
      CAUTION: Set to `0.0.0.0` to listen from anywhere BUT SECURITY RISK.
  rest_port:
    name: "REST Port"
    description: |
      Listening port for REST API server (1024-49151) [Default: 8080]
  rest_authorization_token:
    name: "REST Authorization Token"
    description: |
      Optional authorization token for REST API. [Default: ""]
      If set add the line `-H "Authorization: Bearer <REST_BEARER_TOKEN>"`
      to your REST API calls.
  gestures:
    name: Gesture Command List
    description: |
      Add JSON-like gesture string key and gesture command value pairs. See
      README for formatting Earlier keys take precedence over later keys
  command_whitelist:
    name: "Command Whitelist Regex"
    description: |
      Regex of runnable user commands for the REST API and for use in
      gesture commands. See README for details
  vnc_server:
    name: "VNC Server Password"
    description: |
      Launch VNC Server on port 5900 if password non-blank. If password
      set to '-', then don't require any password. *Use with caution*
  debug_mode:
    name: "Debug Mode"
    description: |
      Launch X and Openbox but not the kiosk browser. [Default: False]
      Manually access using: sudo docker -exec -it addon_haoskiosk bash
